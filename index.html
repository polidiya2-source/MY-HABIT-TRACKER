<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Lifestyle Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #22c55e; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #334155; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .full-width { grid-column: span 2; }
        h2 { margin-top: 0; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .habit-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #e2e8f0; }
        .timer-display { font-size: 3rem; font-weight: bold; text-align: center; margin: 10px 0; font-family: monospace; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-start { background: var(--success); color: white; }
        .btn-water { background: var(--accent); color: white; width: 100%; font-size: 1.2rem; }
        .progress-bar { background: #e2e8f0; border-radius: 10px; height: 20px; overflow: hidden; margin: 10px 0; }
        #waterFill { background: var(--accent); height: 100%; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>⏱️ Study Focus Timer</h2>
        <div class="timer-display" id="display">00:00:00</div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn btn-start" onclick="startTimer()">Start</button>
            <button class="btn" style="background:#ef4444; color:white;" onclick="stopTimer()">Pause</button>
            <button class="btn" style="background:#64748b; color:white;" onclick="resetTimer()">Reset</button>
        </div>
        <p style="text-align:center; margin-top:15px;">Goal: 8 - 10 Hours</p>
    </div>

    <div class="card">
        <h2>💧 Water Intake</h2>
        <div class="timer-display"><span id="waterCount">0</span>/3000 <small style="font-size:1rem">ml</small></div>
        <div class="progress-bar"><div id="waterFill"></div></div>
        <button class="btn btn-water" onclick="addWater()">+ 250ml Glass</button>
    </div>

    <div class="card">
        <h2>✅ Daily Checklist</h2>
        <div id="habitList"></div>
    </div>

    <div class="card">
        <h2>📈 5-Month Growth</h2>
        <canvas id="growthChart"></canvas>
        <button class="btn btn-start" style="width:100%; margin-top:20px;" onclick="logDay()">Save & End Day</button>
    </div>
</div>

<script>
    // --- HABITS SETUP ---
    const habitNames = ["Wake up 5am", "Morning Ex", "Bath", "Healthy Breakfast", "No Oil/Sugar", "Evening Ex", "Skin AM", "Skin PM", "MCQ (80-100)"];
    const listDiv = document.getElementById('habitList');
    habitNames.forEach((h, i) => {
        listDiv.innerHTML += `<div class="habit-item"><input type="checkbox" id="h${i}"> <label>&nbsp;${h}</label></div>`;
    });

    // --- TIMER LOGIC ---
    let startTime, elapsedTime = 0, timerInterval;
    function startTimer() {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            document.getElementById("display").innerHTML = formatTime(elapsedTime);
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }
    function resetTimer() { stopTimer(); elapsedTime = 0; document.getElementById("display").innerHTML = "00:00:00"; }
    function formatTime(ms) {
        let h = Math.floor(ms / 3600000);
        let m = Math.floor((ms % 3600000) / 60000);
        let s = Math.floor((ms % 60000) / 1000);
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    // --- WATER LOGIC ---
    let water = 0;
    function addWater() {
        if(water < 3000) water += 250;
        document.getElementById('waterCount').innerText = water;
        document.getElementById('waterFill').style.width = (water / 3000 * 100) + '%';
    }

    // --- CHART & STORAGE ---
    let history = JSON.parse(localStorage.getItem('warriorHistory')) || [];
    const ctx = document.getElementById('growthChart').getContext('2d');
    let chart = new Chart(ctx, {
        type: 'line',
        data: { labels: history.map(d => d.date), datasets: [{ label: 'Performance %', data: history.map(d => d.score), borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] },
        options: { scales: { y: { min: 0, max: 100 } } }
    });

    function logDay() {
        let checks = 0;
        habitNames.forEach((_, i) => { if(document.getElementById(`h${i}`).checked) checks++; });
        if (elapsedTime >= 28800000) checks++; // 8 hours study bonus
        if (water >= 3000) checks++; // Water bonus
        
        let score = Math.round((checks / 11) * 100);
        history.push({ date: new Date().toLocaleDateString(), score: score });
        localStorage.setItem('warriorHistory', JSON.stringify(history));
        location.reload(); // Reset for tomorrow
    }
</script>
</body>
</html>
